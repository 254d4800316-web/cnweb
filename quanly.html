<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Kỹ năng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ma trận CNTT</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link active" href="quanly.html">Quản lý</a>
                <a class="nav-link" href="debug.html">Debug</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="text-center mb-4">📋 Trang Quản lý Kỹ năng</h1>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5>Form nhập kỹ năng</h5>
            </div>
            <div class="card-body">
                <form id="skillForm">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <input type="text" class="form-control" id="techName" placeholder="Tên công nghệ" required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" class="form-control" id="year" placeholder="Năm" required>
                        </div>
                        <div class="col-md-2">
                            <input type="number" min="1" max="10" class="form-control" id="level" placeholder="Mức 1-10" required>
                        </div>
                        <div class="col-md-3">
                            <button type="button" onclick="addSkill()" class="btn btn-success w-100">Thêm</button>
                        </div>
                    </div>
                    <div class="mt-3">
                        <textarea class="form-control" id="note" rows="2" placeholder="Ghi chú"></textarea>
                    </div>
                </form>
            </div>
        </div>

        <h5>Danh sách kỹ năng</h5>
        <table class="table table-bordered table-hover" id="skillTable">
            <thead class="table-dark">
                <tr>
                    <th>STT</th>
                    <th>Tên công nghệ</th>
                    <th>Năm</th>
                    <th>Mức độ</th>
                    <th>Ghi chú</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button onclick="checkBonus()" class="btn btn-info mt-3">Kiểm tra điều kiện bonus</button>
    </div>

    <script>
        let skills = JSON.parse(localStorage.getItem('skills')) || [];
        const mssv = 2544800316;  // MSSV của em

        function renderTable() {
            const tbody = document.querySelector('#skillTable tbody');
            tbody.innerHTML = '';
            skills.forEach((skill, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td>${skill.name}</td>
                    <td>${skill.year}</td>
                    <td><span class="badge bg-primary">${skill.level}/10</span></td>
                    <td>${skill.note || ''}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteSkill(${i})">Xóa</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addSkill() {
            const name = document.getElementById('techName').value;
            const year = document.getElementById('year').value;
            const level = parseInt(document.getElementById('level').value);
            const note = document.getElementById('note').value;

            if (!name || !year || isNaN(level)) return alert("Nhập đầy đủ thông tin!");

            const newSkill = {name, year, level, note};

            if (mssv % 2 === 0) {
                skills.push(newSkill);
            } else {
                skills.unshift(newSkill);
            }

            localStorage.setItem('skills', JSON.stringify(skills));
            renderTable();
            document.getElementById('skillForm').reset();
        }

        function deleteSkill(i) {
            if (confirm("Xóa?")) {
                skills.splice(i, 1);
                localStorage.setItem('skills', JSON.stringify(skills));
                renderTable();
            }
        }

        function checkBonus() {
            const high = skills.filter(s => s.level > 7).length;
            if (high > 15) {
                alert("Hồ sơ năng lực rất ấn tượng!");
            } else {
                alert(`Hiện có ${high} kỹ năng >7 điểm.`);
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
