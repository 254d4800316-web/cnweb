<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Kỹ năng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">📋 Quản lý Kỹ năng CNTT</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5>Nhập thông tin kỹ năng mới</h5>
            </div>
            <div class="card-body">
                <form id="skillForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tên công nghệ</label>
                            <input type="text" class="form-control" id="techName" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Năm ban hành</label>
                            <input type="number" class="form-control" id="year" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Mức độ (1-10)</label>
                            <input type="number" min="1" max="10" class="form-control" id="level" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ghi chú</label>
                        <textarea class="form-control" id="note" rows="2"></textarea>
                    </div>
                    <button type="button" onclick="addSkill()" class="btn btn-success">Thêm kỹ năng</button>
                </form>
            </div>
        </div>

        <h5>Danh sách kỹ năng</h5>
        <table class="table table-bordered table-hover" id="skillTable">
            <thead class="table-dark">
                <tr>
                    <th>STT</th>
                    <th>Tên công nghệ</th>
                    <th>Năm</th>
                    <th>Mức độ</th>
                    <th>Ghi chú</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let skills = JSON.parse(localStorage.getItem('skills')) || [];
        const mssv = 2544800316;   // ← MSSV của em (sửa nếu sai)

        function renderTable() {
            const tbody = document.querySelector('#skillTable tbody');
            tbody.innerHTML = '';
            
            skills.forEach((skill, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${skill.name}</td>
                    <td>${skill.year}</td>
                    <td><span class="badge bg-primary">${skill.level}/10</span></td>
                    <td>${skill.note || ''}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteSkill(${index})">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addSkill() {
            const name = document.getElementById('techName').value;
            const year = document.getElementById('year').value;
            const level = parseInt(document.getElementById('level').value);
            const note = document.getElementById('note').value;

            if (!name || !year || isNaN(level)) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            const newSkill = { name, year, level, note };

            if (mssv % 2 === 0) {
                skills.push(newSkill);        // Thêm cuối
            } else {
                skills.unshift(newSkill);     // Thêm đầu
            }

            localStorage.setItem('skills', JSON.stringify(skills));
            renderTable();
            document.getElementById('skillForm').reset();
        }

        function deleteSkill(index) {
            if (confirm("Bạn có chắc muốn xóa kỹ năng này?")) {
                skills.splice(index, 1);
                localStorage.setItem('skills', JSON.stringify(skills));
                renderTable();
            }
        }

        // Tự động load khi mở trang
        window.onload = renderTable;
    </script>
</body>
</html>
